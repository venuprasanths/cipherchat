<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>CipherChat - Login</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0a0d14;
            color: white;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            padding: 30px;
            background: #111520;
            border-radius: 24px;
            border: 1px solid #00e5b0;
        }
        h2 {
            text-align: center;
            color: #00e5b0;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .subtitle {
            text-align: center;
            font-size: 12px;
            color: #8696a0;
            margin-bottom: 30px;
        }
        input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            background: #1e2640;
            border: 1px solid #2a3458;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            outline: none;
        }
        input:focus {
            border-color: #00e5b0;
        }
        button {
            width: 100%;
            padding: 14px;
            margin-top: 10px;
            background: #00e5b0;
            color: #0a0d14;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }
        .secondary-btn {
            background: #2a3458;
            color: white;
        }
        .message {
            margin-top: 15px;
            padding: 10px;
            border-radius: 10px;
            font-size: 13px;
            text-align: center;
        }
        .error { background: rgba(255,77,109,0.1); color: #ff4d6d; }
        .success { background: rgba(0,229,176,0.1); color: #00e5b0; }
        .hidden { display: none; }
        .badges {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-top: 20px;
            flex-wrap: wrap;
        }
        .badge {
            font-size: 11px;
            color: #00e5b0;
            background: rgba(0,229,176,0.08);
            padding: 6px 12px;
            border-radius: 20px;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🔐 CipherChat</h2>
    <div class="subtitle">End-to-End Encrypted Chat</div>
    
    <div id="loginForm">
        <input type="email" id="loginEmail" placeholder="Email">
        <input type="password" id="loginPassword" placeholder="Password">
        <button onclick="doLogin()">Login</button>
        <button onclick="showSignup()" class="secondary-btn">Create Account</button>
        <div id="loginMessage" class="message hidden"></div>
    </div>
    
    <div id="signupForm" class="hidden">
        <input type="text" id="signupName" placeholder="Full Name">
        <input type="email" id="signupEmail" placeholder="Email">
        <input type="password" id="signupPassword" placeholder="Password (min 6 chars)">
        <button onclick="doSignup()">Create Account</button>
        <button onclick="showLogin()" class="secondary-btn">Back to Login</button>
        <div id="signupMessage" class="message hidden"></div>
    </div>
    
    <div class="badges">
        <span class="badge">🔒 End-to-End Encrypted</span>
        <span class="badge">🔐 AES-256</span>
        <span class="badge">🛡️ Private</span>
    </div>
</div>

<script>
    async function doLogin() {
        const email = document.getElementById('loginEmail').value;
        const password = document.getElementById('loginPassword').value;
        const msgDiv = document.getElementById('loginMessage');
        
        msgDiv.classList.remove('hidden', 'error', 'success');
        msgDiv.innerHTML = '🔄 Logging in...';
        msgDiv.classList.add('success');
        
        try {
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            });
            const data = await res.json();
            
            if (res.ok && data.success) {
                localStorage.setItem('user', JSON.stringify(data.user));
                msgDiv.innerHTML = '✅ Login successful! Redirecting...';
                setTimeout(() => { window.location.href = '/home'; }, 800);
            } else {
                msgDiv.innerHTML = '❌ ' + (data.error || 'Invalid credentials');
                msgDiv.classList.remove('success');
                msgDiv.classList.add('error');
                setTimeout(() => msgDiv.classList.add('hidden'), 3000);
            }
        } catch(err) {
            msgDiv.innerHTML = '❌ Connection error';
            msgDiv.classList.remove('success');
            msgDiv.classList.add('error');
            setTimeout(() => msgDiv.classList.add('hidden'), 3000);
        }
    }
    
    async function doSignup() {
        const name = document.getElementById('signupName').value;
        const email = document.getElementById('signupEmail').value;
        const password = document.getElementById('signupPassword').value;
        const msgDiv = document.getElementById('signupMessage');
        
        msgDiv.classList.remove('hidden', 'error', 'success');
        
        if (!name || !email || password.length < 6) {
            msgDiv.innerHTML = '❌ Please fill all fields (password min 6 chars)';
            msgDiv.classList.add('error');
            setTimeout(() => msgDiv.classList.add('hidden'), 3000);
            return;
        }
        
        msgDiv.innerHTML = '🔄 Creating account...';
        msgDiv.classList.add('success');
        
        try {
            const res = await fetch('/api/signup', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, password })
            });
            const data = await res.json();
            
            if (res.ok && data.success) {
                msgDiv.innerHTML = '✅ Account created! Please login.';
                setTimeout(() => showLogin(), 1500);
            } else {
                msgDiv.innerHTML = '❌ ' + (data.error || 'Signup failed');
                msgDiv.classList.remove('success');
                msgDiv.classList.add('error');
                setTimeout(() => msgDiv.classList.add('hidden'), 3000);
            }
        } catch(err) {
            msgDiv.innerHTML = '❌ Connection error';
            msgDiv.classList.remove('success');
            msgDiv.classList.add('error');
            setTimeout(() => msgDiv.classList.add('hidden'), 3000);
        }
    }
    
    function showLogin() {
        document.getElementById('loginForm').classList.remove('hidden');
        document.getElementById('signupForm').classList.add('hidden');
    }
    
    function showSignup() {
        document.getElementById('loginForm').classList.add('hidden');
        document.getElementById('signupForm').classList.remove('hidden');
    }
    
    const savedUser = localStorage.getItem('user');
    if (savedUser) {
        window.location.href = '/home';
    }
</script>
</body>
</html>
